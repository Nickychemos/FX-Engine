name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fx
          POSTGRES_PASSWORD: fx
          POSTGRES_DB: fx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fx"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://fx:fx@localhost:5432/fx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r requirements-dev.txt
      - run: pytest -q
