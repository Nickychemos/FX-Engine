services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fx
      POSTGRES_PASSWORD: fx
      POSTGRES_DB: fx
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fx"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://fx:fx@db:5432/fx
    ports:
      - "8000:8000"

volumes:
  pgdata:
